<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Chloe's Hair Studio</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5efe8;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Login */
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 15px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .login-box button {
      background: #2c2418;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .error { color: red; margin-top: 10px; display: none; }
    
    /* Dashboard */
    .dashboard { display: none; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .tab-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
    }
    .tab {
      padding: 10px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .tab.active {
      border-bottom: 3px solid #d99e4a;
      color: #d99e4a;
      font-weight: bold;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .stat-number { font-size: 32px; font-weight: bold; color: #d99e4a; }
    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th { background: #faf5ef; }
    button {
      padding: 6px 12px;
      margin: 2px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-confirm { background: #4caf50; color: white; }
    .btn-delete { background: #f44336; color: white; }
    .btn-approve { background: #4caf50; color: white; }
    .btn-refresh { background: #2196f3; color: white; padding: 8px 16px; }
    .logout-btn { background: #dcb085; color: #2c2418; padding: 8px 16px; }
    .status-pending { background: #fff3e0; padding: 4px 8px; border-radius: 12px; font-size: 12px; }
    .status-confirmed { background: #e0f2e9; padding: 4px 8px; border-radius: 12px; font-size: 12px; }
    .stars { color: #f5b042; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    @media (max-width: 768px) {
      th, td { font-size: 12px; padding: 8px; }
      button { padding: 4px 8px; font-size: 11px; }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Login Panel -->
  <div id="loginPanel" class="login-box">
    <h2>🔐 Admin Login</h2>
    <p>Chloe's Hair Studio</p>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
    <div id="errorMsg" class="error"></div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div class="header">
      <h1>📊 Admin Dashboard</h1>
      <div>
        <button class="btn-refresh" onclick="refreshAll()">🔄 Refresh</button>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab active" onclick="showTab('appointments')">📅 Appointments</button>
      <button class="tab" onclick="showTab('reviews')">⭐ Pending Reviews</button>
      <button class="tab" onclick="showTab('approved')">✅ Approved Reviews</button>
    </div>

    <!-- Appointments Tab -->
    <div id="appointmentsTab" class="tab-content active">
      <div class="stats">
        <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>Total Appointments</div></div>
        <div class="stat-card"><div class="stat-number" id="pendingCount">0</div><div>Pending</div></div>
      </div>
      <div style="overflow-x: auto;">
        <table id="appointmentsTable">
          <thead><tr><th>Date</th><th>Name</th><th>Phone</th><th>Service</th><th>Status</th><th>Message</th><th>Actions</th></tr></thead>
          <tbody id="appointmentsBody"><tr><td colspan="7">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Pending Reviews Tab -->
    <div id="reviewsTab" class="tab-content">
      <div class="stats">
        <div class="stat-card"><div class="stat-number" id="pendingReviewsCount">0</div><div>Pending Reviews</div></div>
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead><tr><th>Date</th><th>Name</th><th>Service</th><th>Rating</th><th>Review</th><th>Actions</th></tr></thead>
          <tbody id="pendingReviewsBody"><tr><td colspan="6">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Approved Reviews Tab -->
    <div id="approvedTab" class="tab-content">
      <div style="overflow-x: auto;">
        <table>
          <thead><tr><th>Date</th><th>Name</th><th>Service</th><th>Rating</th><th>Review</th><th>Actions</th></tr></thead>
          <tbody id="approvedReviewsBody"><tr><td colspan="6">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { 
    loadAllBookings, 
    updateBookingStatus, 
    deleteBooking, 
    loadAllReviews, 
    approveReview, 
    deleteReview 
  } from './firebase.js';

  const PASSWORD = "admin123";  // Change this to your password

  // Make functions global
  window.login = function() {
    const pwd = document.getElementById('password').value;
    if (pwd === PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      document.getElementById('loginPanel').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      refreshAll();
    } else {
      document.getElementById('errorMsg').style.display = 'block';
      document.getElementById('errorMsg').textContent = 'Incorrect password';
    }
  };

  window.logout = function() {
    sessionStorage.removeItem('adminLoggedIn');
    document.getElementById('loginPanel').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('password').value = '';
  };

  window.showTab = function(tabName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    if (tabName === 'appointments') {
      document.querySelector('[data-tab="appointments"]')?.classList.add('active');
      document.getElementById('appointmentsTab').classList.add('active');
    } else if (tabName === 'reviews') {
      document.getElementById('reviewsTab').classList.add('active');
    } else if (tabName === 'approved') {
      document.getElementById('approvedTab').classList.add('active');
    }
    // Update active tab styling
    document.querySelectorAll('.tab').forEach(tab => {
      if ((tabName === 'appointments' && tab.textContent.includes('Appointments')) ||
          (tabName === 'reviews' && tab.textContent.includes('Pending')) ||
          (tabName === 'approved' && tab.textContent.includes('Approved'))) {
        tab.classList.add('active');
      }
    });
  };

  window.refreshAll = async function() {
    await loadAppointments();
    await loadReviews();
  };

  async function loadAppointments() {
    try {
      const bookings = await loadAllBookings();
      document.getElementById('totalCount').textContent = bookings.length;
      document.getElementById('pendingCount').textContent = bookings.filter(b => b.status === 'pending').length;
      
      const tbody = document.getElementById('appointmentsBody');
      if (bookings.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7">No appointments yet</td></tr>';
        return;
      }
      
      tbody.innerHTML = bookings.map(apt => `
        <tr>
          <td>${apt.preferredDate || 'N/A'}</td>
          <td>${escapeHtml(apt.name || '')}</td>
          <td>${escapeHtml(apt.phone || '')}</td>
          <td>${escapeHtml(apt.service || '')}</td>
          <td><span class="status-${apt.status === 'confirmed' ? 'confirmed' : 'pending'}">${apt.status || 'pending'}</span></td>
          <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(apt.message || '')}</td>
          <td>
            ${apt.status !== 'confirmed' ? `<button class="btn-confirm" onclick="confirmBooking('${apt.id}')">Confirm</button>` : ''}
            <button class="btn-delete" onclick="deleteBookingItem('${apt.id}')">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch (err) {
      console.error(err);
      document.getElementById('appointmentsBody').innerHTML = '<tr><td colspan="7">Error loading data</td></tr>';
    }
  }

  async function loadReviews() {
    try {
      const allReviews = await loadAllReviews();
      const pending = allReviews.filter(r => !r.approved);
      const approved = allReviews.filter(r => r.approved === true);
      
      document.getElementById('pendingReviewsCount').textContent = pending.length;
      
      // Pending reviews
      const pendingBody = document.getElementById('pendingReviewsBody');
      if (pending.length === 0) {
        pendingBody.innerHTML = '<tr><td colspan="6">No pending reviews</td></tr>';
      } else {
        pendingBody.innerHTML = pending.map(r => `
          <tr>
            <td>${r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString() : 'N/A'}</td>
            <td>${escapeHtml(r.name || '')}</td>
            <td>${escapeHtml(r.service || '')}</td>
            <td class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</td>
            <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(r.text || '')}</td>
            <td>
              <button class="btn-approve" onclick="approveReviewItem('${r.id}')">Approve</button>
              <button class="btn-delete" onclick="deleteReviewItem('${r.id}')">Delete</button>
            </td>
          </tr>
        `).join('');
      }
      
      // Approved reviews
      const approvedBody = document.getElementById('approvedReviewsBody');
      if (approved.length === 0) {
        approvedBody.innerHTML = '<tr><td colspan="6">No approved reviews yet</td></tr>';
      } else {
        approvedBody.innerHTML = approved.map(r => `
          <tr>
            <td>${r.createdAt?.toDate ? r.createdAt.toDate().toLocaleDateString() : 'N/A'}</td>
            <td>${escapeHtml(r.name || '')}</td>
            <td>${escapeHtml(r.service || '')}</td>
            <td class="stars">${'★'.repeat(r.stars)}${'☆'.repeat(5 - r.stars)}</td>
            <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(r.text || '')}</td>
            <td><button class="btn-delete" onclick="deleteReviewItem('${r.id}')">Delete</button></td>
          </tr>
        `).join('');
      }
    } catch (err) {
      console.error(err);
    }
  }

  window.confirmBooking = async function(id) {
    if (confirm('Confirm this appointment?')) {
      await updateBookingStatus(id, 'confirmed');
      await loadAppointments();
    }
  };

  window.deleteBookingItem = async function(id) {
    if (confirm('Delete this appointment?')) {
      await deleteBooking(id);
      await loadAppointments();
    }
  };

  window.approveReviewItem = async function(id) {
    if (confirm('Approve this review?')) {
      await approveReview(id);
      await loadReviews();
    }
  };

  window.deleteReviewItem = async function(id) {
    if (confirm('Delete this review?')) {
      await deleteReview(id);
      await loadReviews();
    }
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Check login status
  if (sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('loginPanel').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    refreshAll();
  }
</script>
</body>
</html>
